<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — TrustLens</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root { --acid:#b8ff3c; --plasma:#ff3cac; --void:#03000a; --deep:#0a0614; --surface:rgba(255,255,255,0.03); --border:rgba(184,255,60,0.15); --text:#e8e8f0; --muted:#6b6b80; }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    body { background:var(--void); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; overflow-x:hidden; cursor:none; }
    .cursor{position:fixed;width:8px;height:8px;background:var(--acid);border-radius:50%;pointer-events:none;z-index:9999;transition:transform 0.1s;transform:translate(-50%,-50%);}
    .cursor-ring{position:fixed;width:32px;height:32px;border:1px solid rgba(184,255,60,0.5);border-radius:50%;pointer-events:none;z-index:9998;transition:all 0.15s ease;transform:translate(-50%,-50%);}
    body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");opacity:0.4;}
    .grid-bg{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(184,255,60,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(184,255,60,0.03) 1px,transparent 1px);background-size:60px 60px;}
    .orb{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0;animation:drift 20s ease-in-out infinite;}
    .orb-1{width:500px;height:500px;background:rgba(184,255,60,0.06);top:-150px;left:-150px;}
    .orb-2{width:400px;height:400px;background:rgba(255,60,172,0.06);bottom:-100px;right:-100px;animation-delay:-10s;}
    @keyframes drift{0%,100%{transform:translate(0,0);}50%{transform:translate(30px,-20px);}}

    nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 60px;height:72px;background:rgba(3,0,10,0.7);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
    .nav-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem;color:var(--acid);text-decoration:none;display:flex;align-items:center;gap:10px;}
    .nav-logo::before{content:'';width:10px;height:10px;background:var(--acid);border-radius:50%;box-shadow:0 0 20px rgba(184,255,60,0.5);display:block;animation:pulse 2s infinite;}
    @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.5);opacity:0.7;}}
    .nav-links{list-style:none;display:flex;gap:8px;}
    .nav-links a{font-family:'Space Mono',monospace;font-size:0.75rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);text-decoration:none;padding:8px 16px;border-radius:4px;transition:all 0.2s;}
    .nav-links a:hover,.nav-links a.active{color:var(--acid);background:rgba(184,255,60,0.08);}

    .auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:100px 24px 60px;position:relative;z-index:1;}
    .auth-card{width:100%;max-width:480px;position:relative;}

    /* Corner decorations */
    .auth-card::before,.auth-card::after{content:'';position:absolute;width:20px;height:20px;border-color:var(--acid);border-style:solid;}
    .auth-card::before{top:-1px;left:-1px;border-width:2px 0 0 2px;}
    .auth-card::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0;}

    .auth-inner{background:rgba(8,5,16,0.85);border:1px solid var(--border);border-radius:2px;padding:48px;backdrop-filter:blur(20px);box-shadow:0 0 80px rgba(184,255,60,0.06),inset 0 1px 0 rgba(255,255,255,0.04);}

    /* Scan line animation */
    .scan{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--acid),transparent);animation:scan 3s linear infinite;opacity:0.6;}
    @keyframes scan{0%{top:0;}100%{top:100%;}}

    .auth-tag{font-family:'Space Mono',monospace;font-size:0.7rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
    .auth-tag::before{content:'//';color:var(--acid);opacity:0.6;}
    .auth-title{font-family:'Syne',sans-serif;font-weight:800;font-size:2rem;color:#fff;margin-bottom:8px;}
    .auth-sub{font-family:'Space Mono',monospace;font-size:0.8rem;color:var(--muted);margin-bottom:36px;}

    .field{margin-bottom:24px;}
    .field label{display:block;font-family:'Space Mono',monospace;font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--acid);opacity:0.8;margin-bottom:10px;}
    .field input{
      width:100%;padding:14px 18px;background:rgba(0,0,0,0.4);
      border:1px solid rgba(184,255,60,0.15);border-radius:4px;
      color:#e0e8ff;font-family:'Space Mono',monospace;font-size:0.9rem;
      outline:none;transition:all 0.25s;
    }
    .field input::placeholder{color:rgba(184,255,60,0.25);}
    .field input:focus{border-color:rgba(184,255,60,0.5);box-shadow:0 0 20px rgba(184,255,60,0.1);background:rgba(0,0,0,0.6);}

    .btn-auth{
      width:100%;padding:16px;margin-top:8px;
      font-family:'Syne',sans-serif;font-weight:700;font-size:0.95rem;letter-spacing:0.08em;text-transform:uppercase;
      color:var(--void);background:var(--acid);border:none;border-radius:4px;
      cursor:pointer;transition:all 0.25s;position:relative;overflow:hidden;
    }
    .btn-auth::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);transition:left 0.5s;}
    .btn-auth:hover{box-shadow:0 0 30px rgba(184,255,60,0.4),0 8px 30px rgba(184,255,60,0.2);transform:translateY(-1px);}
    .btn-auth:hover::before{left:100%;}

    .auth-footer{margin-top:28px;text-align:center;font-size:0.88rem;color:var(--muted);}
    .auth-footer a{color:var(--acid);text-decoration:none;font-weight:600;}
    .auth-footer a:hover{text-shadow:0 0 10px rgba(184,255,60,0.5);}

    footer{padding:30px 60px;border-top:1px solid var(--border);position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;}
    .footer-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;color:var(--acid);}
    .footer-text{font-family:'Space Mono',monospace;font-size:0.7rem;color:var(--muted);}

    @media(max-width:900px){nav{padding:0 20px;}.nav-links a{font-size:0.65rem;padding:6px 8px;}footer{flex-direction:column;gap:10px;text-align:center;padding:24px;}}
  </style>
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>
<div class="grid-bg"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<header>
  <nav>
    <a href="index.html" class="nav-logo">TrustLens</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="login.html" class="active">Login</a></li>
      <li><a href="register.html">Register</a></li>
    </ul>
  </nav>
</header>

<main class="auth-wrap">
  <div class="auth-card">
    <div class="auth-inner">
      <div class="scan"></div>
      <p class="auth-tag">System Authentication</p>
      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-sub">&gt; Awaiting credential verification...</p>

      <form onsubmit="loginUser(event)">
        <div class="field">
          <label for="loginEmail">&gt; Identifier</label>
          <input type="text" id="loginEmail" placeholder="Enter email or admin" required />
        </div>
        <div class="field">
          <label for="loginPassword">&gt; Passkey</label>
          <input type="password" id="loginPassword" placeholder="Enter your password" required />
        </div>
        <button type="submit" class="btn-auth">Authenticate →</button>
        <p class="auth-footer">Unregistered? <a href="register.html">Initialize New User</a></p>
      </form>
    </div>
  </div>
</main>

<footer>
  <div class="footer-logo">TrustLens</div>
  <div class="footer-text">© 2026 TrustLens — Neural Review Intelligence</div>
</footer>

<script src="js/script.js"></script>
<script src="js/theme.js"></script>
<script>
  const cursor = document.getElementById('cursor');
  const ring = document.getElementById('cursorRing');
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX+'px'; cursor.style.top = e.clientY+'px';
    ring.style.left = e.clientX+'px'; ring.style.top = e.clientY+'px';
  });
  document.querySelectorAll('a,button,input').forEach(el=>{
    el.addEventListener('mouseenter',()=>{ring.style.transform='translate(-50%,-50%) scale(1.8)';ring.style.borderColor='rgba(184,255,60,0.8)';});
    el.addEventListener('mouseleave',()=>{ring.style.transform='translate(-50%,-50%) scale(1)';ring.style.borderColor='rgba(184,255,60,0.5)';});
  });
</script>
</body>
</html>
